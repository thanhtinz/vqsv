# ============================================================
# VQSV — Production stack
#   1. cp .env.example .env  &&  ./scripts/gen-secrets.sh
#   2. docker compose -f docker-compose.prod.yml up -d --build
#
# Caddy terminates HTTPS on 80/443 (auto Let's Encrypt) and proxies the
# REST API + WebSocket to the server. The J2ME binary TCP gateway is
# exposed directly on :9090.
# ============================================================
services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks: [vqsv]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks: [vqsv]

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      HTTP_PORT: 8080
      TCP_PORT: 9090
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS:-200}
      LOG_FILE: /var/log/vqsv/server.log
    volumes:
      - serverlogs:/var/log/vqsv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${TCP_PORT:-9090}:9090"     # J2ME binary TCP gateway (direct)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
    networks: [vqsv]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    networks: [vqsv]

volumes:
  pgdata:
  redisdata:
  serverlogs:
  caddydata:
  caddyconfig:

networks:
  vqsv:
    driver: bridge
