name: CI

# Build and test every part of the stack on push / PR so a broken build
# (e.g. a missing component or a failing migration) is caught before merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (Spring Boot + Kotlin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Build & test
        working-directory: server
        run: ./gradlew --no-daemon test bootJar

  admin:
    name: Admin panel (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - name: Install & build
        working-directory: admin
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          npm ci
          npm run build

  web:
    name: Player website (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install & build
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          npm ci
          npm run build

  clients:
    name: Clients (shared core + desktop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Build shared core + desktop client
        working-directory: clients
        run: ./gradlew --no-daemon :core:jar :desktop:fatJar
