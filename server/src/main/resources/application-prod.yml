# Production profile — activate with SPRING_PROFILES_ACTIVE=prod
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}

server:
  port: ${HTTP_PORT:8080}
  forward-headers-strategy: framework   # honour X-Forwarded-* from the reverse proxy
  shutdown: graceful
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:200}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

vqsv:
  jwt:
    secret: ${JWT_SECRET}            # REQUIRED — no default in prod
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  tcp:
    port: ${TCP_PORT:9090}
  game:
    tick-rate-ms: 100
    max-players-per-map: 50
    pet-max-level: 100
    base-exp-per-level: 100

logging:
  level:
    root: INFO
    com.vqsv: INFO
    org.springframework.web.socket: WARN
  file:
    name: ${LOG_FILE:/var/log/vqsv/server.log}
